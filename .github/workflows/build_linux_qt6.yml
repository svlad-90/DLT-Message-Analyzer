name: Build linux Qt6

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch'
        required: true
        default: 'master'
      collect_artifacts:
        description: 'Collect build artifacts'
        required: false
        default: 'false'
        type: boolean
  workflow_call:
    inputs:
      collect_artifacts:
        description: 'Collect build artifacts'
        required: false
        default: false
        type: boolean

jobs:
  build_linux:

    runs-on: ubuntu-22.04

    steps:

    # Install uuid-dev
    - name: Install uuid-dev
      run: |
           sudo apt update
           sudo DEBIAN_FRONTEND=noninteractive apt-get -yq install uuid-dev libxcb-cursor0
      shell: bash

    # Install Java 11
    - name: Install Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    # Install cmake version v3.24.x
    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: 'v3.24.x'

    # Checkout dlt-viewer's revision 2.27.0
    - name: Checkout of the dlt-viewer
      uses: actions/checkout@v3
      with:
        repository: GENIVI/dlt-viewer
        ref: 2.27.0

    # Checkout project's revision, which is pushed
    - name: Checkout of the ${{ github.event.repository.name }}
      uses: actions/checkout@v3
      with:
        repository: svlad-90/${{ github.event.repository.name }}
        path: ./plugin/${{ github.event.repository.name }}
        ref: ${{ github.ref }}

    # Adjust dlt-viewer's CMake file to sub-include the plugin
    - name: Patch dlt-viewer's CMakeLists.txt
      run: echo 'add_subdirectory(${{ github.event.repository.name }}/dltmessageanalyzerplugin/src)' >> CMakeLists.txt
      shell: bash
      working-directory: ./plugin

    # Install Qt6
    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
         version: 6.5.0
         target: desktop
         host: linux
         dir: ${{ github.workspace }}/Qt6
         cache: true
         modules: 'qtserialport'

    # Create build directory
    - name: Creation of the "../build" directory
      run: mkdir ../build
      shell: bash
      working-directory: ./

    # CMake execution
    - name: CMake
      run: cmake ../${{ github.event.repository.name }} -DCMAKE_BUILD_TYPE=Release
      shell: bash
      working-directory: ../build

    # Build of the project
    - name: Make
      run: make -j8
      shell: bash
      working-directory: ../build

    # Collect required artifacts
    - name: Collect required artifacts
      if: ${{ success() && inputs.collect_artifacts }}
      run: |
        set -euo pipefail

        release_dir="./release_linux_qt6_X86_64"
        qt_dir="${{ github.workspace }}/Qt6/Qt/6.5.0/gcc_64"
        build_dir="$(realpath ../build)"
        mkdir -p "${release_dir}/platforms"

        cp -a ../build/bin/. "${release_dir}/"
        cp -a ../build/version.txt "${release_dir}/"
        cp -a ../build/full_version.txt "${release_dir}/"
        cp -a "${qt_dir}/plugins/platforms/." "${release_dir}/platforms/"

        copy_dependency() {
          local lib="$1"
          local allow_system="${2:-false}"
          local real_lib
          local soname

          [ -f "${lib}" ] || return 0
          real_lib="$(realpath "${lib}")"
          case "${real_lib}" in
            "${qt_dir}"/*|"${{ github.workspace }}"/*|"${build_dir}"/*) ;;
            *)
              if [ "${allow_system}" != "true" ]; then
                return 0
              fi
              case "$(basename "${real_lib}")" in
                libxcb*.so*|libxkbcommon*.so*|libX11*.so*|libXext*.so*) ;;
                *) return 0 ;;
              esac
              ;;
          esac

          cp -a "${real_lib}" "${release_dir}/"
          soname="$(objdump -p "${real_lib}" 2>/dev/null | awk '/SONAME/ && soname == "" {soname = $2} END {print soname}')"
          if [ -n "${soname}" ] && [ ! -e "${release_dir}/${soname}" ] && [ ! -L "${release_dir}/${soname}" ]; then
            ln -s "$(basename "${real_lib}")" "${release_dir}/${soname}"
          fi
        }

        copy_dependencies_for() {
          local binary="$1"
          local allow_system="${2:-false}"
          local lib

          while read -r lib; do
            copy_dependency "${lib}" "${allow_system}"
          done < <(ldd "${binary}" 2>/dev/null | awk '/=>/ {print $(NF - 1)} /^[[:space:]]*\// {print $1}')
        }

        shopt -s nullglob
        for lib in ./build/output/amd64/Release/lib/*.so*; do
          copy_dependency "$(realpath "${lib}")"
        done

        while IFS= read -r binary; do
          copy_dependencies_for "${binary}"
        done < <(find "${release_dir}" -type f \( -perm -0100 -o -name '*.so*' \))

        for plugin in "${release_dir}/platforms/"*.so; do
          copy_dependencies_for "${plugin}" true
        done
        LD_LIBRARY_PATH="${release_dir}:${LD_LIBRARY_PATH:-}" ldd "${release_dir}/platforms/libqxcb.so" | tee "${release_dir}/libqxcb.ldd"
        if grep -q "not found" "${release_dir}/libqxcb.ldd"; then
          exit 1
        fi
        rm "${release_dir}/libqxcb.ldd"

        cat > "${release_dir}/run_dlt.sh" <<'EOF'
        #!/usr/bin/env bash
        set -e
        DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" >/dev/null 2>&1 && pwd )"
        cd "${DIR}"
        export LD_LIBRARY_PATH="${DIR}:${LD_LIBRARY_PATH:-}"
        export QT_PLUGIN_PATH="${DIR}"
        export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
        export QT_QPA_PLATFORM_PLUGIN_PATH="${DIR}/platforms"
        exec ./dlt-viewer "$@"
        EOF
        chmod +x "${release_dir}/run_dlt.sh"
        tar -czf "${release_dir}.tar.gz" "${release_dir}"
      shell: bash
      working-directory: ./

    - name: Upload artifacts
      if: ${{ success() && inputs.collect_artifacts }}
      uses: actions/upload-artifact@v4
      with:
        name: release_linux_qt6_X86_64
        path: |
          release_linux_qt6_X86_64.tar.gz
